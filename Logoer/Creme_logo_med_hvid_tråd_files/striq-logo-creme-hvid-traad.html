      })
      .then(function(blob) {
        blobUrl = URL.createObjectURL(blob);
        var size = blob.size;
        var sizeStr = size < 1024 ? size + " B"
          : size < 1048576 ? (size / 1024).toFixed(1) + " KB"
          : (size / 1048576).toFixed(1) + " MB";
        imgEl.onload = function() {
          info.textContent = imgEl.naturalWidth + " \u00D7 " + imgEl.naturalHeight + "  \u00B7  " + sizeStr;
          show();
        };
        imgEl.onerror = function() { showError("Failed to load image."); };
        imgEl.src = blobUrl;
      })
      .catch(function() { showError("Failed to load image."); });
    } catch (e) {
      showError("An unexpected error occurred.");
    }
  })();
  </script>

</body></html>
