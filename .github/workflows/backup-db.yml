name: Database Backup

# Tager daglig backup af Supabase-databasen og gemmer som artifact.
# Erstatter Supabase Pro's indbyggede backup indtil vi opgraderer.
#
# Kører:
#   - Automatisk hver nat kl. 04:00 UTC (06:00 DK)
#   - Manuelt via Actions-fanen → "Run workflow"
#
# Artifacts:
#   - Navn: striq-db-backup-<run_number>
#   - Indhold: striq-backup-YYYYMMDD_HHMMSS.sql.gz
#   - Retention: 90 dage (GitHub free tier)
#   - Indeholder auth.users med password-hashes — hold repo privat.

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: db-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | \
            sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client-17
          pg_dump --version

      - name: Run pg_dump
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          timestamp=$(date -u +%Y%m%d_%H%M%S)
          outfile="striq-backup-${timestamp}.sql.gz"

          echo "Dumper database til ${outfile}…"
          pg_dump "$DATABASE_URL" \
            --no-owner \
            --no-privileges \
            --clean \
            --if-exists \
            --quote-all-identifiers \
            --verbose 2> pg_dump.log \
            | gzip -9 > "$outfile"

          size=$(stat -c%s "$outfile")
          echo "Backup klar: ${outfile} (${size} bytes)"

          if [ "$size" -lt 1024 ]; then
            echo "::error::Backup-fil er mistænkeligt lille (<1KB) — noget gik galt"
            tail -30 pg_dump.log
            exit 1
          fi

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: striq-db-backup-${{ github.run_number }}
          path: striq-backup-*.sql.gz
          retention-days: 90
          if-no-files-found: error

      - name: Upload pg_dump log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pg_dump-log-${{ github.run_number }}
          path: pg_dump.log
          retention-days: 14
          if-no-files-found: ignore
